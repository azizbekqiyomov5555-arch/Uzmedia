app = "ali-kinobot"
primary_region = "fra"

[build]

[env]
  PYTHONUNBUFFERED = "1"
  PORT = "8080"

# Faqat bitta machine deploy qilinsin (Conflict xatosini bartaraf etadi)
[deploy]
  strategy = "immediate"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1
